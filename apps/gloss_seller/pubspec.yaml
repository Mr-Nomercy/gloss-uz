name: gloss_seller
description: Gloss Seller - Yandex Go style cleaning marketplace
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # State
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  # Navigation
  go_router: ^13.0.0
  # Network
  dio: ^5.4.0
  api_client:
    path: ../../packages/shared/api-client
  models:
    path: ../../packages/shared/models
  constants:
    path: ../../packages/shared/constants
  ui_kit:
    path: ../../packages/ui-kit
  # Storage
  flutter_secure_storage: ^9.0.0
  # Utils
  intl: ^0.20.2
  connectivity_plus: ^5.0.2
  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  patrol: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
