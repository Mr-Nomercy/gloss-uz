# ─────────────────────────────────────────────────────────
# Gloss Production - Promtail Configuration
# ─────────────────────────────────────────────────────────

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 1048576
    batchwait: 1s

scrape_configs:
  # Docker containers (backend, nginx, etc.)
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            stream: stream
            log: log
            container: container_name
            image: image_name
      - labels:
          stream:
          container:
          image:
      - timestamp:
          format: RFC3339Nano
          source: time
      - output:
          source: log

  # Nginx access logs
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-access
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)" "(?P<http_x_forwarded_for>[^"]*)"'
      - labels:
          status:
          remote_addr:
      - timestamp:
          format: "02/Jan/2006:15:04:05 -0700"
          source: time_local
          location: UTC

  # Nginx error logs
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx-error
          __path__: /var/log/nginx/error.log

    pipeline_stages:
      - regex:
          expression: '^(?P<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<message>.*)$'
      - labels:
          level:
      - timestamp:
          format: "2006/01/02 15:04:05"
          source: time
          location: UTC

  # Backend application logs (structured JSON from Pino)
  - job_name: backend-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: gloss-backend
          __path__: /var/log/backend/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            pid: pid
            hostname: hostname
            req_id: req.id
            req_method: req.method
            req_url: req.url
            res_status: res.statusCode
            res_time: res.responseTime
      - labels:
          level:
          req_method:
          res_status:
      - timestamp:
          format: RFC3339Nano
          source: time