apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gloss-production

resources:
  - namespace.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - ingress.yaml
  - cert-manager.yaml
  - configmap.yaml
  - secrets.yaml
  - hpa.yaml
  - network-policy.yaml
  - servicemonitor.yaml

commonLabels:
  app.kubernetes.io/name: gloss-ecosystem
  app.kubernetes.io/instance: production
  app.kubernetes.io/version: v1.0.0
  app.kubernetes.io/managed-by: kustomize

images:
  - name: gloss-backend
    newTag: v1.0.0

configMapGenerator:
  - name: gloss-backend-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - API_PORT=3000
      - CORS_ORIGINS=https://gloss.uz,https://client.gloss.uz,https://provider.gloss.uz,https://seller.gloss.uz

secretGenerator:
  - name: gloss-backend-secrets
    behavior: merge
    literals:
      - JWT_ACCESS_SECRET=CHANGE_ME
      - JWT_REFRESH_SECRET=CHANGE_ME
      - DATABASE_URL=CHANGE_ME
      - REDIS_URL=CHANGE_ME
      - MINIO_ROOT_PASSWORD=CHANGE_ME
      - FCM_SERVER_KEY=CHANGE_ME
      - CLICK_SECRET_KEY=CHANGE_ME
      - PAYME_SECRET_KEY=CHANGE_ME
      - SMS_API_KEY=CHANGE_ME