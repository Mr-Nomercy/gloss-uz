name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/*]

jobs:
  flutter-analyze:
    strategy:
      matrix:
        app: [user, worker, delivery, admin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.x
      - uses: bluefireteam/melos-action@v3
        with:
          melos-version: "6.3.0"
      - run: melos exec --scope="gloss_${{ matrix.app }}" -- flutter analyze
