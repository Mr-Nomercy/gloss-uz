# ─────────────────────────────────────────────────────────
#  Gloss Ecosystem – Local Dev Infrastructure
#  Run:  docker compose up -d
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: gloss-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file: .env
    environment:
      POSTGRES_USER: gloss
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gloss_secret}
      POSTGRES_DB: gloss_ecosystem
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gloss"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - gloss-net

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gloss-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gloss-net

  # ── MinIO (S3-compatible object storage) ─────────────
  minio:
    image: minio/minio
    container_name: gloss-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Console UI
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-gloss_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-gloss_minio_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - gloss-net

# ── Persistent Volumes ─────────────────────────────────
volumes:
  pgdata:
    name: gloss_pgdata
  redis_data:
    name: gloss_redis_data
  minio_data:
    name: gloss_minio_data

# ── Custom Network ────────────────────────────────────
networks:
  gloss-net:
    name: gloss_network
    driver: bridge
