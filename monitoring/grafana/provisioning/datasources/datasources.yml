# ─────────────────────────────────────────────────────────
# Grafana Datasources Provisioning
# ─────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      timeout: "60s"
      derivedFields:
        - name: traceID
          matcherRegex: "trace_id=(\\w+)"
          url: "http://tempo:3200/tempo/trace/${__value.raw}"
          datasourceUid: "tempo"