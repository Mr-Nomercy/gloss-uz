apiVersion: v1
kind: Service
metadata:
  name: gloss-backend-blue
  namespace: gloss-production
  labels:
    app: gloss-backend
    color: blue
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: gloss-backend
    color: blue
---
apiVersion: v1
kind: Service
metadata:
  name: gloss-backend-green
  namespace: gloss-production
  labels:
    app: gloss-backend
    color: green
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: gloss-backend
    color: green
---
apiVersion: v1
kind: Service
metadata:
  name: gloss-backend-active
  namespace: gloss-production
  labels:
    app: gloss-backend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: gloss-backend
    color: blue  # Managed by blue-green controller
---
