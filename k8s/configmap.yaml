apiVersion: v1
kind: ConfigMap
metadata:
  name: gloss-backend-config
  namespace: gloss-production
  labels:
    app: gloss-backend
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_PORT: "3000"
  CORS_ORIGINS: "https://gloss.uz,https://client.gloss.uz,https://provider.gloss.uz,https://seller.gloss.uz"
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "7d"
  YANDEX_MAPKIT_API_KEY: "PROD_KEY"
  FCM_PROJECT_ID: "gloss-prod-xxx"
  CLICK_SERVICE_ID: "PROD_SERVICE_ID"
  PAYME_TEST_MODE: "false"
  SMS_PROVIDER: "eskiz"
  SMS_SENDER_ID: "GLOSS"
  FEATURE_FLAG_NEW_CHECKOUT: "true"
  FEATURE_FLAG_CHAT_V2: "true"
  FEATURE_FLAG_ANALYTICS_V2: "true"
  FEATURE_FLAG_BLUE_GREEN: "true"