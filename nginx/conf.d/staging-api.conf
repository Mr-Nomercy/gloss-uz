# ─────────────────────────────────────────────────────────
# Gloss Staging - API Backend
# ─────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name staging-api.gloss.uz;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name staging-api.gloss.uz;

    ssl_certificate /etc/letsencrypt/live/staging-api.gloss.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-api.gloss.uz/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # API routes
    location / {
        limit_req zone=api burst=200 nodelay;
        proxy_pass http://backend_staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # WebSocket for tracking/orders
    location /socket.io/ {
        limit_req zone=ws burst=100 nodelay;
        proxy_pass http://backend_staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check (no rate limit)
    location /health {
        access_log off;
        proxy_pass http://backend_staging;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}