# ─────────────────────────────────────────────────────────
# Gloss Production - Nginx Blue-Green Main Config
# This is the static part; upstream is managed by deploy script
# ─────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format with deployment color
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'color=$upstream_color';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer sizes
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    client_max_body_size 50m;
    large_client_header_buffers 4 16k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json application/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

    # Upstream definitions (updated by deploy script via /etc/nginx/conf.d/upstream.conf)
    include /etc/nginx/conf.d/upstream.conf;

    # ─────────────────────────────────────────────────────
    # HTTP to HTTPS Redirect
    # ─────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name gloss.uz api.gloss.uz www.gloss.uz;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────
    # HTTPS Server
    # ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.gloss.uz gloss.uz www.gloss.uz;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/gloss.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gloss.uz/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/gloss.uz/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;

        # ─────────────────────────────────────────────────
        # Health Check (No rate limit)
        # ─────────────────────────────────────────────────
        location = /health {
            access_log off;
            proxy_pass http://gloss_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Deployment-Color $upstream_color;
        }

        # ─────────────────────────────────────────────────
        # Auth Endpoints (Strict rate limiting)
        # ─────────────────────────────────────────────────
        location ~ ^/api/(auth|login|register|refresh|forgot-password) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            
            proxy_pass http://gloss_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ─────────────────────────────────────────────────
        # File Upload (Strict rate limiting)
        # ─────────────────────────────────────────────────
        location ~ ^/api/(upload|files) {
            limit_req zone=upload burst=2 nodelay;
            limit_req_status 429;
            
            client_max_body_size 50m;
            client_body_timeout 60s;
            
            proxy_pass http://gloss_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ─────────────────────────────────────────────────
        # WebSocket (Tracking, Chat)
        # ─────────────────────────────────────────────────
        location /socket.io/ {
            limit_req zone=ws burst=50 nodelay;
            limit_req_status 429;
            
            proxy_pass http://gloss_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        # ─────────────────────────────────────────────────
        # General API
        # ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=200 nodelay;
            limit_req_status 429;
            
            proxy_pass http://gloss_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        # ─────────────────────────────────────────────────
        # Static Assets (MinIO)
        # ─────────────────────────────────────────────────
        location /assets/ {
            proxy_pass http://minio1:9000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ─────────────────────────────────────────────────
        # Default - Deny
        # ─────────────────────────────────────────────────
        location / {
            return 404;
        }
    }
}