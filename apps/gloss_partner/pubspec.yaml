name: gloss_partner
description: Gloss Partner — unified worker + courier app
publish_to: none
version: 0.1.0+1
environment:
  sdk: '>=3.2.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.4.0
  models:
    path: ../../packages/shared/models
  constants:
    path: ../../packages/shared/constants
  ui_kit:
    path: ../../packages/ui-kit
  gloss_routing:
    path: ../../packages/gloss_routing
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.2
  timeline_tile: ^2.0.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
flutter:
  uses-material-design: true
  generate: true
