# ─────────────────────────────────────────────────────────
# Gloss Production - Grafana Dashboard Provisioning
# ─────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: 'Gloss Dashboards'
    orgId: 1
    folder: 'Gloss'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards