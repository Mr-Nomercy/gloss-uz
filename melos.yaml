name: gloss_ecosystem
packages:
  - "packages/**"
  - "apps/**"

scripts:
  # Backend (Django, not managed by melos — run from backend/ directly)
  backend:dev: "cd backend && python manage.py runserver"
  backend:lint: "cd backend && ruff check ."
  backend:test: "cd backend && pytest"
  backend:migrate: "cd backend && python manage.py migrate"

  # Flutter apps
  user:dev: melos run --scope=gloss_user -- dev
  firm:dev: melos run --scope=gloss_worker -- dev
  delivery:dev: melos run --scope=gloss_delivery -- dev
  admin:dev: melos run --scope=gloss_admin -- dev

  # Shared packages
  shared:build: "cd packages/shared/models && dart run build_runner build --delete-conflicting-outputs"
  shared:lint: melos exec --scope=shared -- dart analyze

  # API client generation
  gen:client: "cd packages/shared/api-client && dart run build_runner build --delete-conflicting-outputs"

  # All
  lint:all: melos exec -- flutter analyze
  test:all: melos exec -- flutter test
  format: melos exec -- dart format .
  clean: melos clean
  bootstrap: melos bootstrap

  # CI
  ci:check: melos run lint:all && melos run test:all

ide:
  intellij:
    enabled: true
