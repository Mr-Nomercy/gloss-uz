name: Integration Tests (Backend)

on:
  push:
    branches: [main]
    paths:
      - 'packages/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/backend/**'
  workflow_dispatch:
  workflow_call:
    outputs:
      integration-result:
        description: "Integration tests result"
        value: ${{ jobs.integration-tests.result }}

env:
  NODE_VERSION: '20'
  BACKEND_DIR: packages/backend

jobs:
  integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: gloss_secret
          POSTGRES_DB: gloss_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.BACKEND_DIR }}/package-lock.json
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        working-directory: ${{ env.BACKEND_DIR }}
      
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://postgres:gloss_secret@localhost:5432/gloss_test
      
      - name: Run database migrations
        run: npx prisma migrate deploy
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://postgres:gloss_secret@localhost:5432/gloss_test
      
      - name: Run integration tests
        run: npm run test:integration
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: postgresql://postgres:gloss_secret@localhost:5432/gloss_test
          JWT_SECRET: test-jwt-secret-key-for-testing
          CLICK_SERVICE_ID: test_service_id
          CLICK_MERCHANT_ID: test_merchant_id
          CLICK_SECRET_KEY: test_secret_key
          PAYME_ID: test_payme_id
          PAYME_SECRET_KEY: test_payme_secret
          PAYME_ACCOUNTS_KEY: test_accounts_key
          REDIS_URL: redis://localhost:6379
          CLICK_CALLBACK_URL: http://localhost:3000/api/v1/payments/click/callback
          PAYME_CALLBACK_URL: http://localhost:3000/api/v1/payments/payme/callback
      
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-coverage
          path: ${{ env.BACKEND_DIR }}/coverage/integration/
          retention-days: 7
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ${{ env.BACKEND_DIR }}/test-results/
          retention-days: 7

  integration-tests-summary:
    name: Integration Test Summary
    runs-on: ubuntu-latest
    needs: integration-tests
    if: always()
    
    steps:
      - name: Check test results
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if tests failed
        if: ${{ needs.integration-tests.result != 'success' }}
        run: exit 1