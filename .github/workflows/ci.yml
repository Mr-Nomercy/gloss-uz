name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/*]

jobs:
  flutter-analyze:
    strategy:
      matrix:
        app: [user, worker, delivery, admin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.x
      - uses: bluefireteam/melos-action@v3
        with:
          melos-version: "6.3.0"
      - run: melos exec --scope="gloss_${{ matrix.app }}" -- flutter analyze
      - run: melos exec --scope="gloss_${{ matrix.app }}" -- flutter test

  backend-test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: gloss
          POSTGRES_PASSWORD: gloss
          POSTGRES_DB: gloss
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U gloss"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # gloss_app, not gloss — gloss is initdb's bootstrap superuser and
      # Postgres refuses to let it strip its own SUPERUSER flag ("the
      # bootstrap user must have the SUPERUSER attribute"), so the actual
      # app connection has to be a separate, genuinely non-superuser role
      # (superusers bypass RLS, which would make the isolation tests lie).
      DATABASE_URL: postgis://gloss_app:gloss@localhost:5432/gloss
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y gdal-bin libgdal-dev
      - run: pip install -r requirements/dev.txt
        working-directory: backend
      - run: ruff check .
        working-directory: backend
      - name: Create the non-superuser app role
        run: |
          PGPASSWORD=gloss psql -h localhost -U gloss -d gloss -c "
            CREATE ROLE gloss_app WITH LOGIN PASSWORD 'gloss' NOSUPERUSER CREATEDB;
            ALTER DATABASE gloss OWNER TO gloss_app;
            ALTER SCHEMA public OWNER TO gloss_app;
            GRANT ALL PRIVILEGES ON DATABASE gloss TO gloss_app;
          "
      - run: python manage.py migrate
        working-directory: backend
      - run: pytest
        working-directory: backend
