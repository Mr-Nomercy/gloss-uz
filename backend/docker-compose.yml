services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: gloss
      POSTGRES_PASSWORD: gloss
      POSTGRES_DB: gloss
    ports:
      # Host-side port shifted off the default 5432 — that's commonly
      # already taken by a locally-installed Postgres. Containers still
      # reach this one internally via `db:5432` regardless of this mapping.
      - "5455:5432"
    volumes:
      - gloss_db_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gloss"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Same reasoning as db above — host-side only, shifted off the
      # default port since a local Redis is often already using it.
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env
    environment:
      # gloss_app, not gloss — gloss is initdb's bootstrap superuser
      # (superusers bypass RLS); gloss_app is the real, non-superuser
      # app role created by docker/postgres-init/01-app-role-nosuperuser.sql.
      DATABASE_URL: postgis://gloss_app:gloss@db:5432/gloss
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery-worker:
    build: .
    env_file: .env
    environment:
      # gloss_app, not gloss — gloss is initdb's bootstrap superuser
      # (superusers bypass RLS); gloss_app is the real, non-superuser
      # app role created by docker/postgres-init/01-app-role-nosuperuser.sql.
      DATABASE_URL: postgis://gloss_app:gloss@db:5432/gloss
      REDIS_URL: redis://redis:6379/0
    command: celery -A config worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  gloss_db_data:
