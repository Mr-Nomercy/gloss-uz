# ─────────────────────────────────────────────────────────
# Gloss Ecosystem - Production Docker Compose (Blue-Green)
# Run: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL (Primary - Blue) ───────────────────────
  postgres-blue:
    image: postgres:16-alpine
    container_name: gloss-postgres-blue
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_blue:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── PostgreSQL (Standby - Green) ──────────────────────
  postgres-green:
    image: postgres:16-alpine
    container_name: gloss-postgres-green
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Replica configuration
      POSTGRES_REPLICA: "true"
      PRIMARY_HOST: postgres-blue
    volumes:
      - pgdata_green:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    depends_on:
      postgres-blue:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── PgBouncer (Connection Pooler) ─────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.21
    container_name: gloss-pgbouncer-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:6432:5432"
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-blue:5432/${POSTGRES_DB}"
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 100
      MIN_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 20
      RESERVE_POOL_TIMEOUT: 5
    depends_on:
      postgres-blue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - gloss-prod-net

  # ── Redis Cluster (Primary + Replica) ─────────────────
  redis-primary:
    image: redis:7-alpine
    container_name: gloss-redis-primary
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_primary_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    networks:
      - gloss-prod-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis-replica:
    image: redis:7-alpine
    container_name: gloss-redis-replica
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --replicaof redis-primary 6379 --masterauth ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_replica_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - gloss-prod-net
    depends_on:
      redis-primary:
        condition: service_healthy

  # ── MinIO (Distributed Mode - 4 nodes for HA) ─────────
  minio1:
    image: minio/minio:latest
    container_name: gloss-minio1
    restart: unless-stopped
    command: server http://minio{1...4}/data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data1:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - gloss-prod-net

  minio2:
    image: minio/minio:latest
    container_name: gloss-minio2
    restart: unless-stopped
    command: server http://minio{1...4}/data --console-address ":9001"
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data2:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    depends_on:
      - minio1

  minio3:
    image: minio/minio:latest
    container_name: gloss-minio3
    restart: unless-stopped
    command: server http://minio{1...4}/data --console-address ":9001"
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data3:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    depends_on:
      - minio1

  minio4:
    image: minio/minio:latest
    container_name: gloss-minio4
    restart: unless-stopped
    command: server http://minio{1...4}/data --console-address ":9001"
    env_file:
      - .env.prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data4:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    depends_on:
      - minio1

  # ── Backend Blue (Active) ─────────────────────────────
  backend-blue:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: runtime
    container_name: gloss-backend-blue
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      DEPLOYMENT_COLOR: blue
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true&connection_limit=50"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis-primary:6379"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
      minio1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { if (r.statusCode !== 200) process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  # ── Backend Green (Standby) ───────────────────────────
  backend-green:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
      target: runtime
    container_name: gloss-backend-green
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      DEPLOYMENT_COLOR: green
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true&connection_limit=50"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis-primary:6379"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-primary:
        condition: service_healthy
      minio1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { if (r.statusCode !== 200) process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4.0"
        reservations:
          memory: 1G
          cpus: "2.0"
    networks:
      - gloss-prod-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  # ── Nginx Load Balancer (Blue-Green Traffic Switch) ───
  nginx:
    image: nginx:alpine
    container_name: gloss-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-blue-green.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend-blue
      - backend-green
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    networks:
      - gloss-prod-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  # ── Certbot (Let's Encrypt) ───────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: gloss-certbot-prod
    restart: "no"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  # ── Prometheus (Monitoring) ───────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: gloss-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - gloss-prod-net

  # ── Grafana (Dashboards) ──────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: gloss-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    env_file:
      - .env.prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - gloss-prod-net
    depends_on:
      - prometheus

  # ── Loki (Log Aggregation) ────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: gloss-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - gloss-prod-net

  # ── Promtail (Log Shipper) ───────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: gloss-promtail
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    networks:
      - gloss-prod-net
    depends_on:
      - loki

# ── Persistent Volumes ──────────────────────────────────
volumes:
  pgdata_blue:
    name: gloss_pgdata_blue
  pgdata_green:
    name: gloss_pgdata_green
  redis_primary_data:
    name: gloss_redis_primary_data
  redis_replica_data:
    name: gloss_redis_replica_data
  minio_data1:
    name: gloss_minio_data1
  minio_data2:
    name: gloss_minio_data2
  minio_data3:
    name: gloss_minio_data3
  minio_data4:
    name: gloss_minio_data4
  nginx_cache:
    name: gloss_nginx_cache_prod
  prometheus_data:
    name: gloss_prometheus_data
  grafana_data:
    name: gloss_grafana_data
  loki_data:
    name: gloss_loki_data

# ── Networks ────────────────────────────────────────────
networks:
  gloss-prod-net:
    name: gloss_network_prod
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16