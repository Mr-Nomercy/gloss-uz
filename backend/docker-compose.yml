services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: gloss
      POSTGRES_PASSWORD: gloss
      POSTGRES_DB: gloss
    ports:
      - "5432:5432"
    volumes:
      - gloss_db_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gloss"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgis://gloss:gloss@db:5432/gloss
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  gloss_db_data:
