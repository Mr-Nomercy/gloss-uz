name: Deploy Apps

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'App to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - client
          - provider
          - deliver
          - seller

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJSON(github.event.inputs.app == 'all' && '["client","provider","deliver","seller"]' || format('["{0}"]', github.event.inputs.app)) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - name: Build APK
        run: flutter build apk --release
        working-directory: apps/gloss_${{ matrix.app }}
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gloss_${{ matrix.app }}
          path: apps/gloss_${{ matrix.app }}/build/app/outputs/flutter-apk/*.apk
