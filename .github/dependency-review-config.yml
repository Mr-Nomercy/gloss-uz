# Dependency Review Configuration
# This configuration controls the behavior of GitHub's dependency review action

# Severity threshold for failing the check
# Options: low, medium, high, critical
fail-on-severity: high

# Allow specific licenses (comma-separated)
# allow-licenses: "MIT,Apache-2.0,BSD-3-Clause,ISC"

# Deny specific licenses (comma-separated)
# deny-licenses: "GPL-3.0,AGPL-3.0"

# Allow specific scopes (comma-separated)
# allow-scopes: "dependencies,devDependencies,optionalDependencies"

# Deny specific scopes (comma-separated)
# deny-scopes: ""

# Allow specific packages (comma-separated, supports wildcards)
# allow-packages: ""

# Deny specific packages (comma-separated, supports wildcards)
deny-packages: "event-stream,flatmap-stream"

# Allow specific versions (comma-separated, package@version)
# allow-versions: ""

# Deny specific versions (comma-separated, package@version)
# deny-versions: ""

# Configuration for GitHub's built-in vulnerability alerts
# This is handled separately via GitHub's Dependabot alerts