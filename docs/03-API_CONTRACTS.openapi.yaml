openapi: 3.1.0
info:
  title: Gloss Ecosystem API
  version: 1.0.0
  description: |
    Unified API for Gloss Cleaning Service + Marketplace.
    Single backend serving gloss_client, gloss_provider_deliver, gloss_seller apps.
    Role-based access control via JWT claims.
# Rate Limiting
All endpoints are rate-limited. Per-endpoint limits:
- Auth endpoints (register, login, forgot-password, reset-password): 10 req/min per IP
- General API: 100 req/min per user/IP  
- WebSocket: 60 messages/min per connection
- Payment webhooks: 30 req/min per IP
On rate limit exceeded, API returns 429 with Retry-After header.

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.gloss.uz
    description: Production

x-cors:
  allowedOrigins:
    - https://gloss-client.uz
    - https://gloss-seller.uz
    - https://gloss-admin.uz
  allowedMethods: [GET, POST, PUT, PATCH, DELETE]
  allowedHeaders: [Content-Type, Authorization, X-Idempotency-Key]
  maxAge: 86400

components:
  securitySchemes:
    # Password hashing: argon2id (memory=19MB, iterations=2, parallelism=1)
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RefreshToken:
      type: apiKey
      in: header
      name: x-refresh-token

    # Standard error responses (all endpoints may return these)
    # 400: BadRequestError — validation failure
    # 401: UnauthorizedError — missing/invalid JWT
    # 403: ForbiddenError — insufficient role permissions
    # 404: NotFoundError — resource not found
    # 409: ConflictError — duplicate, race condition, state conflict
    # 422: UnprocessableEntityError — business rule violation
    # 429: RateLimitError — too many requests
    # 500: InternalServerError — unexpected failure

  schemas:
    # ─── Common ───
    Pagination:
      type: object
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer }
        totalPages: { type: integer }

    ApiResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data: {}

    ApiError:
      type: object
      properties:
        success: { type: boolean, default: false }
        statusCode: { type: integer }
        message: { type: string }
        errors: { type: array, items: { type: object } }

    RateLimitError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 429
        message:
          type: string
          example: Too many requests. Please try again in 60 seconds.
        error:
          type: string
          example: Too Many Requests
        retryAfter:
          type: integer
          example: 60

    RateLimitHeaders:
      type: object
      properties:
        X-RateLimit-Limit:
          type: integer
          description: Maximum requests per window
        X-RateLimit-Remaining:
          type: integer
          description: Remaining requests in current window
        X-RateLimit-Reset:
          type: integer
          description: Unix timestamp when the rate limit resets
        Retry-After:
          type: integer
          description: Seconds to wait before retrying (only on 429)

    # ─── Auth ───
    LoginDto:
      type: object
      required: [phone, password]
      properties:
        phone: { type: string, example: "+998901234567" }
        password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$'
          description: "Minimum 8 characters, at least one uppercase letter, one lowercase letter, one digit, and one special character"
        deviceToken: { type: string }

    RegisterDto:
      type: object
      required: [phone, password, acceptedTos, acceptedPrivacyPolicy]
      properties:
        phone:
          type: string
          example: "+998901234567"
        password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$'
          description: "Minimum 8 characters, at least one uppercase letter, one lowercase letter, one digit, and one special character"
        fullName: { type: string }
        roles:
          type: array
          items:
            type: string
            enum: [client, provider, courier, seller]
        deviceToken: { type: string }
        acceptedTos:
          type: boolean
          description: Must accept Terms of Service
        acceptedPrivacyPolicy:
          type: boolean
          description: Must accept Privacy Policy

    TokenResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        user: { $ref: '#/components/schemas/UserResponse' }

    VerifyPhoneDto:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string }
        code: { type: string, minLength: 4, maxLength: 6 }

    # ─── User ───
    UserResponse:
      type: object
      properties:
        id: { type: string }
        phone: { type: string }
        email: { type: string, nullable: true }
        fullName: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        language: { type: string }
        roles: { type: array, items: { type: string } }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    UpdateProfileDto:
      type: object
      properties:
        fullName: { type: string }
        email: { type: string, format: email }
        language: { type: string, enum: [uz, ru, en] }
        avatar: { type: string }

    # ─── Address ───
    AddressDto:
      type: object
      required: [lat, lng, addressLine]
      properties:
        id: { type: string }
        label: { type: string, enum: [home, work, other] }
        lat: { type: number, format: float }
        lng: { type: number, format: float }
        addressLine: { type: string }
        building: { type: string }
        entrance: { type: string }
        floor: { type: string }
        apartment: { type: string }
        doorCode: { type: string }
        comment: { type: string }
        isDefault: { type: boolean }

    # ─── Service ───
    ServiceTypeResponse:
      type: object
      properties:
        id: { type: string }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        icon: { type: string }
        sortOrder: { type: integer }
        services: { type: array, items: { $ref: '#/components/schemas/ServiceResponse' } }

    ServiceResponse:
      type: object
      properties:
        id: { type: string }
        serviceTypeId: { type: string }
        name: { type: string }
        description: { type: string }
        durationMinutes: { type: integer }
        minArea: { type: number, nullable: true }
        maxArea: { type: number, nullable: true }
        basePrice: { type: number }
        pricings: { type: array, items: { $ref: '#/components/schemas/ServicePricingResponse' } }

    ServicePricingResponse:
      type: object
      properties:
        id: { type: string }
        areaFrom: { type: number, nullable: true }
        areaTo: { type: number, nullable: true }
        pricePerSqm: { type: number, nullable: true }
        fixedPrice: { type: number, nullable: true }
        extraOptions: { type: object }

    # ─── Category ───
    CategoryResponse:
      type: object
      properties:
        id: { type: string }
        parentId: { type: string, nullable: true }
        name: { type: string }
        slug: { type: string }
        image: { type: string, nullable: true }
        children: { type: array, items: { $ref: '#/components/schemas/CategoryResponse' } }

    # ─── Product ───
    ProductCreateDto:
      type: object
      required: [categoryId, name, basePrice]
      properties:
        categoryId: { type: string }
        name: { type: string }
        description: { type: string }
        brand: { type: string }
        unit: { type: string }
        basePrice: { type: number }
        salePrice: { type: number }
        sku: { type: string }
        stockQty: { type: integer }
        minOrderQty: { type: integer }
        weight: { type: number }
        volume: { type: number }
        images: { type: array, items: { type: string } }
        variants: { type: array, items: { $ref: '#/components/schemas/ProductVariantDto' } }

    ProductResponse:
      type: object
      properties:
        id: { type: string }
        sellerId: { type: string }
        categoryId: { type: string }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        brand: { type: string }
        unit: { type: string }
        basePrice: { type: number }
        salePrice: { type: number, nullable: true }
        stockQty: { type: integer }
        minOrderQty: { type: integer }
        status: { type: string }
        rating: { type: number }
        images: { type: array, items: { $ref: '#/components/schemas/ProductImageResponse' } }
        variants: { type: array, items: { $ref: '#/components/schemas/ProductVariantResponse' } }
        createdAt: { type: string, format: date-time }

    ProductVariantDto:
      type: object
      required: [name, price, stockQty]
      properties:
        name: { type: string }
        sku: { type: string }
        price: { type: number }
        stockQty: { type: integer }
        attributes: { type: object }

    ProductVariantResponse:
      allOf:
        - { $ref: '#/components/schemas/ProductVariantDto' }
        - properties:
            id: { type: string }
            productId: { type: string }

    ProductImageResponse:
      type: object
      properties:
        id: { type: string }
        url: { type: string }
        isPrimary: { type: boolean }

    # ─── Order ───
    CreateServiceOrderDto:
      type: object
      required: [type, serviceId]
      properties:
        type: { type: string, enum: [service], default: service }
        serviceId: { type: string }
        addressId: { type: string }
        scheduledAt: { type: string, format: date-time, nullable: true }
        area: { type: number }
        rooms: { type: integer }
        extras: { type: array, items: { type: string } }
        notes: { type: string }

    CreateProductOrderDto:
      type: object
      required: [type, items, addressId]
      properties:
        type: { type: string, enum: [product], default: product }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItemDto' } }
        addressId: { type: string }
        notes: { type: string }

    CreateMixedOrderDto:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [mixed], default: mixed }
        service: { $ref: '#/components/schemas/CreateServiceOrderDto' }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItemDto' } }
        addressId: { type: string }
        scheduledAt: { type: string, format: date-time, nullable: true }
        notes: { type: string }

    OrderItemDto:
      type: object
      required: [productId, quantity]
      properties:
        productId: { type: string }
        variantId: { type: string }
        quantity: { type: integer, minimum: 1 }

    OrderResponse:
      type: object
      properties:
        id: { type: string }
        orderNumber: { type: string }
        clientId: { type: string }
        type: { type: string, enum: [service, product, mixed] }
        status: { type: string }
        subtotal: { type: number }
        discount: { type: number }
        deliveryFee: { type: number }
        total: { type: number }
        paymentStatus: { type: string }
        paymentMethod: { type: string, nullable: true }
        scheduledAt: { type: string, format: date-time, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        items: { type: array, items: { $ref: '#/components/schemas/OrderItemResponse' } }
        provider: { $ref: '#/components/schemas/UserResponse' }
        courier: { $ref: '#/components/schemas/UserResponse' }
        tracking: { $ref: '#/components/schemas/TrackingResponse' }
        address: { $ref: '#/components/schemas/AddressDto' }
        createdAt: { type: string, format: date-time }

    OrderItemResponse:
      type: object
      properties:
        id: { type: string }
        product: { $ref: '#/components/schemas/ProductResponse' }
        variant: { $ref: '#/components/schemas/ProductVariantResponse' }
        service: { $ref: '#/components/schemas/ServiceResponse' }
        quantity: { type: integer }
        unitPrice: { type: number }
        totalPrice: { type: number }

    # ─── Tracking ───
    TrackingResponse:
      type: object
      properties:
        id: { type: string }
        orderId: { type: string }
        courierId: { type: string, nullable: true }
        courierName: { type: string }
        courierPhone: { type: string }
        courierAvatar: { type: string }
        courierRating: { type: number }
        status: { type: string }
        currentLat: { type: number }
        currentLng: { type: number }
        estimatedArrival: { type: string, format: date-time, nullable: true }
        distanceKm: { type: number, nullable: true }
        routePolyline: { type: string, nullable: true }

    LocationUpdateDto:
      type: object
      required: [lat, lng]
      properties:
        lat: { type: number, format: float }
        lng: { type: number, format: float }
        accuracy: { type: number }
        speed: { type: number }
        heading: { type: number }
        battery: { type: integer }

    # ─── Chat ───
    ChatResponse:
      type: object
      properties:
        id: { type: string }
        orderId: { type: string }
        type: { type: string }
        participants: { type: array, items: { $ref: '#/components/schemas/UserResponse' } }
        lastMessage: { $ref: '#/components/schemas/MessageResponse' }
        unreadCount: { type: integer }
        createdAt: { type: string, format: date-time }

    MessageResponse:
      type: object
      properties:
        id: { type: string }
        chatId: { type: string }
        fromUserId: { type: string }
        fromUserName: { type: string }
        type: { type: string }
        content: { type: string }
        metadata: { type: object }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    SendMessageDto:
      type: object
      required: [content]
      properties:
        content: { type: string }
        type: { type: string, default: text }
        metadata: { type: object }

    # ─── Payment ───
    InitPaymentDto:
      type: object
      required: [orderId, method]
      properties:
        orderId: { type: string }
        method: { type: string, enum: [click, payme, cash] }

    PaymentResponse:
      type: object
      properties:
        id: { type: string }
        orderId: { type: string }
        amount: { type: number }
        currency: { type: string }
        method: { type: string }
        status: { type: string }
        paymentUrl: { type: string, nullable: true }
        paidAt: { type: string, format: date-time, nullable: true }

    # ─── KYC ───
    KYCDocumentResponse:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        fileUrl: { type: string }
        status: { type: string }
        rejectionReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    SubmitKYCDto:
      type: object
      required: [type, fileUrl]
      properties:
        type: { type: string, enum: [passport, selfie, bank_card, inn, license] }
        fileUrl: { type: string }

    # ─── Seller ───
    SellerProfileResponse:
      type: object
      properties:
        id: { type: string }
        userId: { type: string }
        shopName: { type: string }
        shopSlug: { type: string }
        description: { type: string }
        logo: { type: string, nullable: true }
        rating: { type: number }
        totalSales: { type: integer }
        totalProducts: { type: integer }
        commissionRate: { type: number }
        isVerified: { type: boolean }
        kycStatus: { type: string }

    UpdateSellerProfileDto:
      type: object
      properties:
        shopName: { type: string }
        description: { type: string }
        logo: { type: string }
        banner: { type: string }

    # ─── Review ───
    CreateReviewDto:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }
        isAnonymous: { type: boolean }

    ReviewResponse:
      type: object
      properties:
        id: { type: string }
        orderId: { type: string }
        fromUser: { $ref: '#/components/schemas/UserResponse' }
        rating: { type: integer }
        comment: { type: string }
        images: { type: array, items: { type: string } }
        isAnonymous: { type: boolean }
        createdAt: { type: string, format: date-time }

    # ─── Notification ───
    NotificationResponse:
      type: object
      properties:
        id: { type: string }
        type: { type: string }
        title: { type: string }
        body: { type: string }
        data: { type: object }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    BadRequestError:
      type: object
      properties:
        statusCode: { type: integer, example: 400 }
        message: { type: string, example: "Validation failed" }
        errors: { type: array, items: { type: string } }
    UnauthorizedError:
      type: object
      properties:
        statusCode: { type: integer, example: 401 }
        message: { type: string, example: "Invalid or expired token" }
    ForbiddenError:
      type: object
      properties:
        statusCode: { type: integer, example: 403 }
        message: { type: string, example: "Insufficient permissions" }
    NotFoundError:
      type: object
      properties:
        statusCode: { type: integer, example: 404 }
        message: { type: string, example: "Resource not found" }
    ConflictError:
      type: object
      properties:
        statusCode: { type: integer, example: 409 }
        message: { type: string, example: "Resource conflict" }
    UnprocessableEntityError:
      type: object
      properties:
        statusCode: { type: integer, example: 422 }
        message: { type: string, example: "Business rule violation" }
        errors: { type: array, items: { type: string } }
    InternalServerError:
      type: object
      properties:
        statusCode: { type: integer, example: 500 }
        message: { type: string, example: "Internal server error" }

  responses:
    # All standard error responses below are reusable across any endpoint via $ref.
    # Use '#/components/responses/{ErrorName}' in any path's responses section.
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/BadRequestError' }
    Unauthorized:
      description: Unauthorized — invalid or missing token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/UnauthorizedError' }
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ForbiddenError' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/NotFoundError' }
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ConflictError' }
    UnprocessableEntity:
      description: Unprocessable entity — business rule violation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/UnprocessableEntityError' }
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/InternalServerError' }
    RateLimitError:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
      headers:
        Retry-After:
          schema:
            type: integer

paths:
  # ─── AUTH ───
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterDto' }
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/TokenResponse' }
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
          headers:
            Retry-After:
              schema: { type: integer }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginDto' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/TokenResponse' }
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
          headers:
            Retry-After:
              schema: { type: integer }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security:
        - RefreshToken: []
      responses:
        '200':
          description: Token refreshed

        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/verify-phone:
    post:
      tags: [Auth]
      summary: Verify phone with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyPhoneDto' }
      responses:
        '200':
          description: Phone verified

        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out

        '429':
          $ref: '#/components/responses/RateLimitError'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string }
      responses:
        '200':
          description: OTP sent to phone
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
          headers:
            Retry-After:
              schema: { type: integer }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code, newPassword]
              properties:
                phone: { type: string }
                code: { type: string }
                newPassword:
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$'
                  description: "Minimum 8 characters, at least one uppercase letter, one lowercase letter, one digit, and one special character"
      responses:
        '200':
          description: Password reset successfully
          headers:
            X-RateLimit-Limit:
              schema: { type: integer }
            X-RateLimit-Remaining:
              schema: { type: integer }
            X-RateLimit-Reset:
              schema: { type: integer }
        '429':
