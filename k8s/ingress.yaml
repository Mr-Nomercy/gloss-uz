apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gloss-api-ingress
  namespace: gloss-production
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "90"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "90"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Deployment-Color $upstream_cookie_color always;
spec:
  tls:
    - hosts:
        - api.gloss.uz
        - gloss.uz
      secretName: gloss-api-tls
  rules:
    - host: api.gloss.uz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gloss-backend-active
                port:
                  number: 3000
    - host: gloss.uz
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: gloss-backend-active
                port:
                  number: 3000
          - path: /socket.io/
            pathType: Prefix
            backend:
              service:
                name: gloss-backend-active
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gloss-client-ingress
