name: "Gloss CodeQL Config"

queries:
  - uses: security-extended
  - uses: security-and-quality

paths-ignore:
  - "node_modules"
  - "dist"
  - "build"
  - "*.generated.ts"
  - "test/**"
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "**/*.d.ts"
  - "coverage/**"
  - ".git"
  - ".github"
  - "docs"
  - "scripts"
  - "*.md"

paths:
  - "packages/backend/src"
  - "packages/shared"

language: typescript

# Custom queries for NestJS/TypeScript security
# - SQL injection detection
# - XSS prevention
# - Authentication/Authorization checks
# - Input validation